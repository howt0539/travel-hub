<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Hub</title>
<meta name="theme-color" content="#e0f2fe">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>">
<style>
  html {
    background-color: #e0f2fe;
    overscroll-behavior-y: contain;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background-color: #e0f2fe;
    background-image: linear-gradient(180deg, #e0f2fe 0%, #7dd3fc 15%, #38bdf8 35%, #0284c7 50%, #38bdf8 65%, #7dd3fc 85%, #e0f2fe 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: #0c4a6e;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 60px 20px 40px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    color: #0c4a6e;
    letter-spacing: 2px;
  }
  .header p {
    font-size: 0.82rem;
    color: #0369a1;
    margin-top: 6px;
  }

  /* Trip cards */
  .trip-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .trip-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 16px;
    padding: 20px;
    text-decoration: none;
    color: inherit;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .trip-card:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  }
  .trip-card:active {
    transform: translateY(-1px);
  }
  .trip-emoji {
    font-size: 2.4rem;
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.35);
    border-radius: 14px;
  }
  .trip-info {
    flex: 1;
    min-width: 0;
  }
  .trip-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: #0c4a6e;
  }
  .trip-date {
    font-size: 0.78rem;
    color: #0369a1;
    margin-top: 2px;
  }
  .trip-desc {
    font-size: 0.75rem;
    color: #0e7490;
    margin-top: 4px;
  }
  .trip-arrow {
    flex-shrink: 0;
    font-size: 1.2rem;
    color: #0369a1;
    opacity: 0.5;
  }

  /* Coming soon */
  .trip-card.coming-soon {
    opacity: 0.5;
    cursor: default;
    pointer-events: none;
  }
  .trip-card.coming-soon .trip-emoji {
    filter: grayscale(0.3);
  }
  .soon-badge {
    display: inline-block;
    font-size: 0.62rem;
    font-weight: 700;
    background: rgba(14, 116, 144, 0.2);
    color: #0e7490;
    padding: 2px 8px;
    border-radius: 6px;
    margin-top: 4px;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 60px;
    font-size: 0.7rem;
    color: rgba(12, 74, 110, 0.4);
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-icon">✈️</div>
    <h1>TRAVEL HUB</h1>
    <p>Ashley & Howt 的旅行計畫</p>
  </div>

  <div class="trip-grid">
    <a class="trip-card" href="https://palau-trip.pages.dev/">
      <div class="trip-emoji">🇵🇼</div>
      <div class="trip-info">
        <div class="trip-name">帛琉 Palau</div>
        <div class="trip-date">2026</div>
        <div class="trip-desc">行程規劃 · 記帳 · 魚類圖鑑</div>
      </div>
      <div class="trip-arrow">›</div>
    </a>

    <a class="trip-card" href="https://bali-trip-5n6.pages.dev/">
      <div class="trip-emoji">🇮🇩</div>
      <div class="trip-info">
        <div class="trip-name">峇里島 Bali</div>
        <div class="trip-date">規劃中</div>
        <div class="trip-desc">行程速查 · 幣值轉換</div>
      </div>
      <div class="trip-arrow">›</div>
    </a>
  </div>

  <div class="footer">Travel Hub · Ashley & Howt</div>
</div>

</body>
</html>
